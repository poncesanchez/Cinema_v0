server:
  port: 8082

spring:
  application:
    name: peliculas-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cinebook}
    username: ${SPRING_DATASOURCE_USERNAME:cinebook}
    password: ${SPRING_DATASOURCE_PASSWORD:cinebook}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
